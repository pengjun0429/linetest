name: 24h Keep Render Alive

on:
  schedule:
    # 這裡的 Cron 設定代表：每 10 分鐘執行一次
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允許手動測試

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
    - name: 發送請求拍醒 Render
      run: |
        # 請把下方的網址換成你真正的 Render 網址（結尾加 /callback 或是 / 都可以）
        # -I 代表只抓取網頁標頭，-s 代表安靜模式，不佔用太多日誌空間
        curl -I -s https://my-line-bot-zhnx.onrender.com/
